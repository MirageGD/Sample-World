name: Notify Deployment Repo

on:
  push:
    branches: [ main ]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Trigger deploy build
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.DEPLOYMENT_REPO_PAT }}
          repository: MirageGD/Deployment
          event-type: content-updated
